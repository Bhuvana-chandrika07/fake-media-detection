kind = "web"
previewPath = "/"
title = "AI Fake Media Detection Platform"
version = "1.0.0"
id = "artifacts/deepfake-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19666
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/deepfake-detector run dev"

[services.env]
PORT = "19666"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/deepfake-detector", "run", "build"]
publicDir = "artifacts/deepfake-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
